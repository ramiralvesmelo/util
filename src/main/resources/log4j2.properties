# ================================
#   Configuraçăo do Log4j2
# ================================
status = error
name = PropertiesConfig

# ---------------- Appenders ----------------
appenders = console, file

# Console
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# File
appender.file.type = File
appender.file.name = LogFile
appender.file.fileName = /tmp/logs/util.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# ---------------- Loggers ----------------
# Declare apenas "util" pois é o alias usado abaixo
loggers = util

# Logger específico da sua lib
logger.util.name = br.com.ramiralvesmelo.util
logger.util.level = error
logger.util.additivity = false
logger.util.appenderRefs = console, file
logger.util.appenderRef.console.ref = Console
logger.util.appenderRef.file.ref = LogFile

# ---------------- Root Logger ----------------
rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = LogFile
